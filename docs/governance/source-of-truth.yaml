schema_version: 1
governance_id: TRAIBOX-C0.1-SOURCE-OF-TRUTH
status: CANONICAL
owner: "@jeszymczuk"
last_reviewed: "2026-07-13"
activation:
  status_semantics: intended_post_approval
  effective_when: merged_to_main_by_repository_owner
  approval_record: "PR #38"
  draft_branch_authority: false
  rule: >-
    C0.1 statuses and decisions become effective only when the repository owner
    approves and merges PR #38 into main. Before that merge, this draft branch
    has no authority over main; the merge is the founder approval record.

allowed_statuses:
  - CANONICAL
  - APPROVED
  - REVIEW
  - SUPERSEDED
  - ARCHIVED
  - PENDING_IMPORT

rules:
  implementation_authority:
    - CANONICAL
    - APPROVED
  non_authoritative:
    - REVIEW
    - SUPERSEDED
    - ARCHIVED
    - PENDING_IMPORT
  activation_exception: >-
    A non-authoritative source may govern only when an APPROVED governance
    decision names and activates a specific section.
  missing_source: "Do not reconstruct, fabricate, or promote an unverified copy."
  repository_reality: >-
    Contracts, migrations, routes, and tests reveal implementation reality but
    cannot silently override approved product architecture.
  status_interpretation: >-
    Every status recorded by C0.1 is its intended post-approval status and is
    subject to the top-level activation rule.

precedence:
  - rank: 1
    id: chapter-0
    title: "Ch.0 — TRAIBOX Vision, Mission and Why We Exist"
    status: PENDING_IMPORT
    path: null
    dependency: "Product intent and mission-level conflict resolution."
  - rank: 2
    id: product-architecture-v6-1
    title: "Product Architecture v6.1"
    status: PENDING_IMPORT
    path: null
