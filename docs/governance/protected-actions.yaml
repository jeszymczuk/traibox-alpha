identifier_source: packages/contracts/src/index.ts#PROTECTED_ACTIONS

governance_rule: >-
  Agents may propose but never execute these actions or mutate canonical Trade,
  Finance, Payment, Clearance, Approval, instrument, or escrow state. Execution
  requires typed validation, authorization, policy evaluation, idempotency where
  required, independent domain validation, human approval where required, audit,
  and replayability.

actions:
  - identifier: send_payment
    owning_domain: payments
    severity: critical
    release_gate: blocks_real_value_execution
    pilot_gate: blocks_any_pilot_path_that_can_reach_this_endpoint
    required_remediation: >-
      Before execution, require approved approval-object binding to the exact
      action, target, payload, debtor account, route, provider, mode, adapter,
      capability set, and deployment payment policy; consume the approval with
      immutable compare-and-set semantics; prohibit silent rail substitution;
      enforce idempotency and denial audit; and perform independent
      Payments-domain validation.
    initiating_roles: [owner, admin, finance]
    approval_requirement: "Required; both direct and payment-intent execution enforce a fully approved approval object bound to the exact payment intent, frozen canonical execution payload, and server-derived execution-policy snapshot."
    idempotency_requirement: required
    independent_validation_requirement: "Validate approved target/action, beneficiary, amount, currency, route, and non-duplication."
    audit_requirement: required
    implementation_locations:
      - packages/contracts/src/index.ts
      - apps/api/src/server.ts
