profile_id: dev
region: eu-iberia
features:
  tradebrain_llm_enabled: false
  ledger_anchoring_enabled: false
tradebrain:
  default_corridor: PT-ES
  incoterms_default: DAP
  hs_thresholds:
    confident: 0.7
    ambiguous: 0.4
  llm:
    enabled: false
    model: claude-sonnet-5
    max_tokens: 1024
compliance:
  complyadvantage:
    enabled: false
finance:
  demo_offers_enabled: true
  stf:
    enabled: true
    default_path: uop
    minimum_grade: eligible
  prime_policy_id: fin_v1
payments:
  active_provider: manual
  rails_preference: ["SEPA_INSTANT", "SEPA"]
  manual:
    enabled: true
    allow_completion: true
  truelayer:
    enabled: false
ledger:
  anchoring:
    enabled: false
    adapter: evm_event
    network: xdc
    chain_id: 50
    confirmations: 3
privacy:
  data_region: eu-iberia
  pii_on_chain: false
  retention:
    evidence_days: 365
    audit_days: 2555
    memory_days: 365
    eval_artifact_days: 180
    external_access_token_days: 30
pilot:
  controlled_rollout: false
  target_smes: 1
  required_smoke_scenarios: ["full_trade_room_loop"]
  degraded_mode:
    manual_payment_fallback_required: true
    partner_offer_fallback_required: false
    allow_llm_disabled: true
