profile_id: eu-pilot
region: eu
features:
  tradebrain_llm_enabled: false
  ledger_anchoring_enabled: true
tradebrain:
  # For multi-country pilots we avoid defaulting to PT-ES.
  default_corridor: EU-EU
  incoterms_default: DAP
compliance:
  complyadvantage:
    enabled: true
kyb:
  mode: lite
finance:
  # “Real offers” via partner submissions in pilots.
  demo_offers_enabled: false
  stf:
    enabled: true
    default_path: uop
    minimum_grade: eligible
  prime_policy_id: fin_v1
payments:
  rails_preference: ["SEPA_INSTANT", "SEPA"]
  # Manual fallback keeps pilots running when a bank/country is unsupported by AIS/PIS.
  manual:
    enabled: true
    allow_completion: true
  truelayer:
    enabled: true
    webhooks:
      verify_signatures: true
ledger:
  anchoring:
    enabled: true
    network: xdc
    chain_id: 50
    confirmations: 3
privacy:
  data_region: eu
  pii_on_chain: false
  retention:
    evidence_days: 365
    audit_days: 2555
    memory_days: 365
    eval_artifact_days: 180
    external_access_token_days: 30
  data_subject_requests:
    export_sla_days: 30
    deletion_review_sla_days: 30
pilot:
  controlled_rollout: true
  target_smes: 20
  required_smoke_scenarios:
    - full_trade_room_loop
    - standalone_payment
    - standalone_clearance
    - counterparty_onboarding_screening
    - funding_request
    - document_first
  degraded_mode:
    manual_payment_fallback_required: true
    partner_offer_fallback_required: true
    allow_llm_disabled: true
