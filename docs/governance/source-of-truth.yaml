    title: "v7 Pilot-Ready Architecture Cut"
    status: PENDING_IMPORT
    path: null
    dependency: "Pilot-specific product and architecture reconciliation."
  - rank: 4
    id: chapter-2-reconciled
    title: "reconciled Ch.2 Experience System"
    status: PENDING_IMPORT
    path: null
    dependency: "Experience principles and interaction model."
  - rank: 5
