# Fly.io app template for TRAIBOX API Edge (Fastify)
# - Replace `app` with your actual Fly app name.
# - Set required secrets with: `fly secrets set KEY=VALUE ...`
app = "traibox-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "3001"
  NODE_ENV = "production"

[[services]]
  internal_port = 3001
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    timeout = "2s"
