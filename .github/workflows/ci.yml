name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify TRAIBOX alpha
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: traibox
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d traibox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Unit and contract tests
        run: corepack pnpm test

      - name: Alpha scenario integration tests
        env:
          ALPHA_INTEGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DEPLOYMENT_PROFILE_PATH: ${{ github.workspace }}/packages/profiles/profiles/dev.yaml
        run: corepack pnpm test:alpha:integration

      - name: Build
        run: corepack pnpm build
