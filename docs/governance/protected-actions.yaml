    owning_domain: payments
    initiating_roles: [owner, admin, finance]
    approval_requirement: "Required; enforced for payment-intent execution but not for direct payment execution."
    idempotency_requirement: required
    independent_validation_requirement: "Validate approved target/action, beneficiary, amount, currency, route, and non-duplication."
    audit_requirement: required
    implementation_locations:
      - packages/contracts/src/index.ts
      - apps/api/src/server.ts
      - apps/api/src/services/payments.ts
      - apps/api/src/services/alpha.ts
      - apps/api/src/domains/approvals/protected-actions.ts
      - apps/web/src/components/standalone-workspace.tsx
      - apps/web/src/app/trade/[tradeId]/trade-page-client.tsx
    test_coverage:
      - apps/api/src/services/alpha.scenario.test.ts
      - apps/api/src/services/rails.scenario.test.ts
      - apps/api/src/domains/approvals/protected-actions.test.ts
      - packages/contracts/src/alpha.test.ts
    confidence: high
    unresolved_questions:
      - "Why does POST /v1/payments/execute execute without an approval_id while the intent-bound path validates one?"

