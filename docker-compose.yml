services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traibox
    ports:
      - "54321:5432"
    volumes:
      - traibox_pg:/var/lib/postgresql/data

  trade-brain:
    build:
      context: ./apps/trade-brain
    profiles:
      - intelligence
    ports:
      - "8010:8010"
    environment:
      # LLM enrichment is off unless BOTH the flag is on and a key is present.
      # Compose interpolates these from the root .env (never commit the key).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TRADE_BRAIN_LLM_ENABLED: ${TRADE_BRAIN_LLM_ENABLED:-false}
      TRADE_BRAIN_LLM_MODEL: ${TRADE_BRAIN_LLM_MODEL:-claude-opus-4-8}
      TRADE_BRAIN_LLM_MAX_TOKENS: ${TRADE_BRAIN_LLM_MAX_TOKENS:-1024}
      TRADE_BRAIN_LLM_EFFORT: ${TRADE_BRAIN_LLM_EFFORT:-}

volumes:
  traibox_pg:
