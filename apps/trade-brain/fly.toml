app = "traibox-trade-brain"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  TRADE_BRAIN_LLM_ENABLED = "false"
  TRADE_BRAIN_REQUIRE_AUTH = "true"

[http_service]
  internal_port = 8010
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "3s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
