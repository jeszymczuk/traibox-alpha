name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify TRAIBOX alpha
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: traibox
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d traibox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Structural conformance
        run: corepack pnpm conformance

      - name: Conformance negative fixtures
        run: corepack pnpm conformance:test

      - name: Component token audit
        run: corepack pnpm audit:component-tokens

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Runtime pilot preflight
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DEPLOYMENT_PROFILE_PATH: ${{ github.workspace }}/packages/profiles/profiles/dev.yaml
          AUTH_MODE: dev
          DEV_USER_ID: 00000000-0000-0000-0000-0000000000aa
          RUNTIME_TARGET: ci
        run: corepack pnpm pilot:check

      - name: Migration preflight
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DATABASE_ENV: ci
        run: |
          mkdir -p artifacts/migration-preflight
          corepack pnpm db:migrate:dry-run > artifacts/migration-preflight/latest.json

      - name: Upload migration preflight report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: migration-preflight-report
          path: artifacts/migration-preflight/latest.json
          if-no-files-found: warn

      - name: Unit and contract tests
        run: corepack pnpm test

      - name: Install Trade Brain dependencies
        run: python -m pip install -r apps/trade-brain/requirements.txt

      - name: Trade Brain tests
        run: corepack pnpm test:trade-brain

      - name: Trade Brain eval gate
        run: corepack pnpm eval:trade-brain:ci

      - name: Upload Trade Brain eval report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trade-brain-eval-report
          path: artifacts/trade-brain-evals/latest.json
          if-no-files-found: warn

      - name: Alpha scenario integration tests
        env:
          ALPHA_INTEGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DEPLOYMENT_PROFILE_PATH: ${{ github.workspace }}/packages/profiles/profiles/dev.yaml
        run: corepack pnpm test:alpha:integration

      - name: Rails scenario integration tests
        env:
          ALPHA_INTEGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DEPLOYMENT_PROFILE_PATH: ${{ github.workspace }}/packages/profiles/profiles/dev.yaml
        run: corepack pnpm test:rails:integration

      - name: Build
        run: corepack pnpm build
