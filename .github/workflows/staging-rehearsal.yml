name: Staging Rehearsal

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Deployed staging API base URL"
        required: true
        type: string
      web_base_url:
        description: "Deployed staging web base URL"
        required: true
        type: string
      backup_restore_checked_at:
        description: "ISO timestamp for latest restore drill"
        required: true
        type: string
      backup_restore_drill_id:
        description: "Restore drill identifier"
        required: true
        type: string
      backup_location:
        description: "Backup system/location"
        required: true
        type: string
      migration_approved_by:
        description: "Approver for staging migration preflight"
        required: false
        type: string
      allow_pending_migrations:
        description: "Allow pending migrations during staging preflight"
        required: true
        default: false
        type: boolean

jobs:
  rehearse:
    name: Rehearse staging deployment
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: traibox
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d traibox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Audit staging env mapping
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          AUTH_MODE: supabase
          SUPABASE_JWT_SECRET: ${{ secrets.STAGING_SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          TRUELAYER_CLIENT_ID: ${{ secrets.STAGING_TRUELAYER_CLIENT_ID }}
          TRUELAYER_CLIENT_SECRET: ${{ secrets.STAGING_TRUELAYER_CLIENT_SECRET }}
          TRUELAYER_WEBHOOK_SECRET: ${{ secrets.STAGING_TRUELAYER_WEBHOOK_SECRET }}
          IBANFIRST_API_KEY: ${{ secrets.STAGING_IBANFIRST_API_KEY }}
          IBANFIRST_WEBHOOK_SECRET: ${{ secrets.STAGING_IBANFIRST_WEBHOOK_SECRET }}
          COMPLYADVANTAGE_API_KEY: ${{ secrets.STAGING_COMPLYADVANTAGE_API_KEY }}
          EVM_RPC_URL: ${{ secrets.STAGING_EVM_RPC_URL }}
          EVM_ANCHOR_REGISTRY_ADDRESS: ${{ secrets.STAGING_EVM_ANCHOR_REGISTRY_ADDRESS }}
          EVM_ANCHOR_WALLET_PRIVATE_KEY: ${{ secrets.STAGING_EVM_ANCHOR_WALLET_PRIVATE_KEY }}
          PARTNER_JWT_SECRET: ${{ secrets.STAGING_PARTNER_JWT_SECRET }}
          ALLOW_PRODUCTION_MIGRATIONS: ${{ inputs.allow_pending_migrations }}
          MIGRATION_APPROVED_BY: ${{ inputs.migration_approved_by || github.actor }}
          BACKUP_RESTORE_CHECKED_AT: ${{ inputs.backup_restore_checked_at }}
          BACKUP_RESTORE_DRILL_ID: ${{ inputs.backup_restore_drill_id }}
          BACKUP_LOCATION: ${{ inputs.backup_location }}
          STAGING_API_BASE_URL: ${{ inputs.api_base_url }}
          STAGING_WEB_BASE_URL: ${{ inputs.web_base_url }}
        run: corepack pnpm staging:secrets:check

      - name: Release gate against disposable Postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DATABASE_ENV: ci
          ALPHA_INTEGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/traibox
          DEPLOYMENT_PROFILE_PATH: ${{ github.workspace }}/packages/profiles/profiles/dev.yaml
        run: corepack pnpm release:gate:ci

      - name: Staging rehearsal with real pilot env
        env:
          DEPLOYMENT_PROFILE_PATH: ${{ github.workspace }}/packages/profiles/profiles/staging.yaml
          DATABASE_ENV: staging
          DB_PRODUCTION_LIKE: "true"
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          AUTH_MODE: supabase
          SUPABASE_JWT_SECRET: ${{ secrets.STAGING_SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          TRUELAYER_CLIENT_ID: ${{ secrets.STAGING_TRUELAYER_CLIENT_ID }}
          TRUELAYER_CLIENT_SECRET: ${{ secrets.STAGING_TRUELAYER_CLIENT_SECRET }}
          TRUELAYER_WEBHOOK_SECRET: ${{ secrets.STAGING_TRUELAYER_WEBHOOK_SECRET }}
          IBANFIRST_API_KEY: ${{ secrets.STAGING_IBANFIRST_API_KEY }}
          IBANFIRST_WEBHOOK_SECRET: ${{ secrets.STAGING_IBANFIRST_WEBHOOK_SECRET }}
          COMPLYADVANTAGE_API_KEY: ${{ secrets.STAGING_COMPLYADVANTAGE_API_KEY }}
          EVM_RPC_URL: ${{ secrets.STAGING_EVM_RPC_URL }}
          EVM_ANCHOR_REGISTRY_ADDRESS: ${{ secrets.STAGING_EVM_ANCHOR_REGISTRY_ADDRESS }}
          EVM_ANCHOR_WALLET_PRIVATE_KEY: ${{ secrets.STAGING_EVM_ANCHOR_WALLET_PRIVATE_KEY }}
          PARTNER_JWT_SECRET: ${{ secrets.STAGING_PARTNER_JWT_SECRET }}
          ALLOW_PRODUCTION_MIGRATIONS: ${{ inputs.allow_pending_migrations }}
          MIGRATION_APPROVED_BY: ${{ inputs.migration_approved_by || github.actor }}
          BACKUP_RESTORE_CHECKED_AT: ${{ inputs.backup_restore_checked_at }}
          BACKUP_RESTORE_DRILL_ID: ${{ inputs.backup_restore_drill_id }}
          BACKUP_LOCATION: ${{ inputs.backup_location }}
          STAGING_API_BASE_URL: ${{ inputs.api_base_url }}
          STAGING_WEB_BASE_URL: ${{ inputs.web_base_url }}
        run: corepack pnpm staging:rehearsal

      - name: Upload staging rehearsal report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-rehearsal-report
          path: |
            artifacts/staging-rehearsals/*.json
            artifacts/staging-secret-audits/*.json
          if-no-files-found: warn
