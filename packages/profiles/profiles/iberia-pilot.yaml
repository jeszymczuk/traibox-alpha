profile_id: iberia-pilot
region: eu-iberia
features:
  tradebrain_llm_enabled: false
  ledger_anchoring_enabled: true
tradebrain:
  default_corridor: PT-ES
  incoterms_default: DAP
compliance:
  complyadvantage:
    enabled: true
finance:
  demo_offers_enabled: false
  stf:
    enabled: true
    default_path: uop
    minimum_grade: eligible
  prime_policy_id: fin_v1
payments:
  rails_preference: ["SEPA_INSTANT", "SEPA"]
  manual:
    enabled: true
    allow_completion: true
  truelayer:
    enabled: true
ledger:
  anchoring:
    enabled: true
    network: xdc
    chain_id: 50
    confirmations: 3
pilot:
  controlled_rollout: true
  target_smes: 8
  required_smoke_scenarios:
    - full_trade_room_loop
    - standalone_payment
    - funding_request
    - document_first
  degraded_mode:
    manual_payment_fallback_required: true
    partner_offer_fallback_required: true
    allow_llm_disabled: true
